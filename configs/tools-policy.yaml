defaults:
  dry_run: true
  audit: true
  allow_on_production_models: false
  approval_token_required_for_mutations: true

tools:
  GetSelection:
    category: read
    mutates_model: false
    requires_approval: false
    allowed_in_production: true

  QueryObjects:
    category: read
    mutates_model: false
    requires_approval: false
    allowed_in_production: true

  ValidateModel:
    category: read
    mutates_model: false
    requires_approval: false
    allowed_in_production: true

  DryRun:
    category: simulation
    mutates_model: false
    requires_approval: false
    allowed_in_production: true

  CreateBeam:
    category: create
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

  CreateColumn:
    category: create
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

  CreateRebar:
    category: create
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

  ModifyObject:
    category: modify
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

  DeleteObject:
    category: delete
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

  GenerateDrawingDraft:
    category: export
    mutates_model: true
    requires_approval: true
    allowed_in_production: false

# Patterns are matched after Unicode normalisation (NFKC), confusable folding
# (Cyrillic homoglyphs -> Latin) and zero-width stripping. List intent in BOTH
# English and Russian, since the corpus and users are Russian-speaking.
blocked_patterns:
  # English
  - "execute arbitrary c#"
  - "run powershell from prompt"
  - "release rd without approval"
  - "delete all"
  - "disable audit"
  - "ignore previous instructions"
  - "ignore all previous"
  - "bypass approval"
  # Russian
  - "выполни произвольный c#"
  - "запусти powershell"
  - "выпусти рд без согласования"
  - "удали всё"
  - "удали все"
  - "отключи аудит"
  - "игнорируй предыдущие инструкции"
  - "игнорируй все инструкции"
  - "обойди согласование"

