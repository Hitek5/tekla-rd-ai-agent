<svg xmlns="http://www.w3.org/2000/svg" width="1180" height="720" viewBox="0 0 1180 720" role="img" aria-labelledby="title desc">
  <title id="title">Runtime architecture for Tekla/RD local AI agent</title>
  <desc id="desc">Human-facing architecture diagram showing user workstation, GPU server, local model serving, RAG, policy and audit.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#2f4f4f"/>
    </marker>
    <style>
      .bg { fill: #f8fafc; }
      .zone { fill: #ffffff; stroke: #cbd5e1; stroke-width: 2; rx: 14; }
      .zone-title { font: 700 18px Arial, sans-serif; fill: #0f172a; }
      .box { fill: #eef6ff; stroke: #2563eb; stroke-width: 2; rx: 10; }
      .box2 { fill: #f0fdf4; stroke: #16a34a; stroke-width: 2; rx: 10; }
      .box3 { fill: #fff7ed; stroke: #ea580c; stroke-width: 2; rx: 10; }
      .box4 { fill: #fdf2f8; stroke: #db2777; stroke-width: 2; rx: 10; }
      .title { font: 700 16px Arial, sans-serif; fill: #111827; }
      .text { font: 13px Arial, sans-serif; fill: #334155; }
      .small { font: 12px Arial, sans-serif; fill: #475569; }
      .line { stroke: #2f4f4f; stroke-width: 2.2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 7 6; }
    </style>
  </defs>
  <rect class="bg" x="0" y="0" width="1180" height="720"/>
  <text x="40" y="42" class="zone-title">Tekla/RD Local AI Agent MVP: runtime view</text>
  <text x="40" y="66" class="text">Primary idea: the LLM proposes actions, policy decides what is allowed, Tekla tools execute only whitelisted operations.</text>

  <rect class="zone" x="35" y="100" width="350" height="560"/>
  <text x="60" y="132" class="zone-title">User workstation</text>

  <rect class="box" x="70" y="165" width="270" height="78"/>
  <text x="94" y="195" class="title">Engineer in Tekla</text>
  <text x="94" y="220" class="text">Natural-language request</text>

  <rect class="box2" x="70" y="285" width="270" height="98"/>
  <text x="94" y="315" class="title">TeklaWorkstationHost</text>
  <text x="94" y="340" class="text">127.0.0.1:51234</text>
  <text x="94" y="362" class="text">Whitelisted tool endpoints</text>

  <rect class="box3" x="70" y="430" width="270" height="96"/>
  <text x="94" y="460" class="title">Tekla Structures</text>
  <text x="94" y="485" class="text">Open API adapter</text>
  <text x="94" y="507" class="text">Copied models during MVP</text>

  <rect class="box4" x="70" y="570" width="270" height="58"/>
  <text x="94" y="604" class="title">Local workstation audit</text>

  <rect class="zone" x="425" y="100" width="720" height="560"/>
  <text x="450" y="132" class="zone-title">GPU server inside KSPD</text>

  <rect class="box" x="465" y="165" width="270" height="112"/>
  <text x="489" y="195" class="title">Orchestrator API</text>
  <text x="489" y="220" class="text">FastAPI service</text>
  <text x="489" y="242" class="text">Prompt builder, RAG, routing</text>
  <text x="489" y="264" class="text">OpenAI-compatible model calls</text>

  <rect class="box2" x="805" y="165" width="270" height="112"/>
  <text x="829" y="195" class="title">LLM serving</text>
  <text x="829" y="220" class="text">vLLM / llama.cpp / Ollama</text>
  <text x="829" y="242" class="text">Qwen / DeepSeek code models</text>
  <text x="829" y="264" class="text">GPU-backed inference</text>

  <rect class="box3" x="465" y="335" width="270" height="112"/>
  <text x="489" y="365" class="title">RAG layer</text>
  <text x="489" y="390" class="text">Tekla API docs, examples, RD</text>
  <text x="489" y="412" class="text">chunks.jsonl / Qdrant</text>
  <text x="489" y="434" class="text">Verified metadata</text>

  <rect class="box4" x="805" y="335" width="270" height="112"/>
  <text x="829" y="365" class="title">Policy and approval</text>
  <text x="829" y="390" class="text">Tool whitelist</text>
  <text x="829" y="412" class="text">Dry-run by default</text>
  <text x="829" y="434" class="text">Approval token for mutations</text>

  <rect class="box4" x="465" y="505" width="270" height="78"/>
  <text x="489" y="535" class="title">JSONL audit</text>
  <text x="489" y="560" class="text">Prompt hash, tool, decision, result</text>

  <rect class="box3" x="805" y="505" width="270" height="78"/>
  <text x="829" y="535" class="title">Air-gap mirrors</text>
  <text x="829" y="560" class="text">OCI, PyPI, NuGet, HF, Git</text>

  <path class="line" d="M 340 204 C 400 204, 405 220, 465 220"/>
  <text x="383" y="194" class="small">HTTPS chat</text>

  <path class="line" d="M 735 220 L 805 220"/>
  <text x="751" y="210" class="small">LLM API</text>

  <path class="line" d="M 600 277 L 600 335"/>
  <text x="615" y="310" class="small">retrieve</text>

  <path class="line" d="M 735 392 L 805 392"/>
  <text x="748" y="382" class="small">check</text>

  <path class="line dashed" d="M 805 405 C 650 470, 505 310, 340 335"/>
  <text x="565" y="476" class="small">approved tool call</text>

  <path class="line" d="M 205 383 L 205 430"/>
  <text x="220" y="410" class="small">Tekla Open API</text>

  <path class="line" d="M 600 277 L 600 505"/>
  <text x="615" y="485" class="small">audit event</text>

  <path class="line" d="M 205 526 L 205 570"/>
  <text x="220" y="552" class="small">local log</text>
</svg>

